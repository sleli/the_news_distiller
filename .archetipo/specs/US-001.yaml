  **User Story**
  In qualitĂ  di sviluppatore,
  voglio che le tabelle `DistillJob` e `DistillSource` esistano nel database con i campi corretti,
  in modo da poter persistere le richieste di distillazione, il loro stato e le fonti associate.

  **Dimostrabile**
  Dopo l'implementazione di questa spec, uno sviluppatore puĂ˛ eseguire `npx prisma db push` senza errori e verificare tramite un client SQLite che le tabelle esistano con tutti i campi definiti.

  **Criteri di Accettazione**
  - [ ] `DistillJob` ha i campi: `id`, `userId` (FK â†’ User), `topic`, `tone`, `status` (enum: PENDING/RUNNING/DONE/FAILED), `result` (JSON nullable), `createdAt`, `updatedAt`
  - [ ] `DistillSource` ha i campi: `id`, `jobId` (FK â†’ DistillJob), `url`, `title`, `excerpt`, `position`
  - [ ] Le relazioni Userâ†’DistillJob e DistillJobâ†’DistillSource sono definite nello schema Prisma
  - [ ] `npx prisma db push` completa senza errori su database SQLite
