spec_code: US-014
body: |-
  # US-014: Implementare le API GET per la lista e il dettaglio dei job — Piano di implementazione

  **Generato da:** ARchetipo Planning Team
  **Data:** 2026-06-19

  ---

  ## Spec

  **Epic:** EP-004 — Notifica e Consultazione
  **Priorità:** HIGH | **Punti:** 2

  **User Story**
  In qualità di Marco, utente autenticato, voglio poter recuperare la lista dei miei distillati e il dettaglio di un singolo distillato tramite API, in modo da visualizzarli nella web app.

  **Criteri di Accettazione**
  - [ ] `GET /api/distill` restituisce i job dell'utente autenticato ordinati per `createdAt` DESC, con campi: `id`, `topic`, `tone`, `status`, `createdAt`
  - [ ] `GET /api/distill/[id]` restituisce il job completo incluso `result` (se DONE) per l'utente proprietario
  - [ ] Richiedere un job di un altro utente restituisce 404 (non 403, per evitare enumerazione)
  - [ ] Richieste senza sessione valida restituiscono 401

  ---

  ## Soluzione Tecnica

  Entrambe le route esistono già nel codebase ma sono parzialmente incomplete: `/api/distill/route.ts` espone solo `POST` (manca il `GET` per la lista), e `/api/distill/[id]/route.ts` espone `GET` ma restituisce una risposta incompleta (mancano `result` e `sources`).

  - Aggiungere l'export `GET` al file `src/app/api/distill/route.ts` usando `prisma.distillJob.findMany({ where: { userId: user.id }, orderBy: { createdAt: 'desc' }, select: { id, topic, tone, status, createdAt } })`. L'handler segue il pattern di autenticazione già adottato nel `POST` dello stesso file.
  - Aggiornare l'handler `GET` in `src/app/api/distill/[id]/route.ts`: aggiungere `include: { sources: true }` alla query Prisma e includere `result` (nullable, as-is dal campo `Json?`) e `sources` nella risposta JSON.
  - Il pattern di autenticazione (`getCurrentUser()` + 401) e la protezione ownership con 404 (non 403) sono già implementati correttamente nell'handler esistente — nessuna modifica necessaria su quel fronte.

  ---

  ## Strategia di Test

  Spec puramente API senza UI — test di integrazione Jest seguendo il pattern di `tests/integration/settings-api.test.ts` (DB SQLite isolato per test, mock di `getCurrentUser`, import diretto degli handler).

  - **GET /api/distill**: 401 senza sessione, lista vuota per nuovo utente, lista ordinata per `createdAt` DESC, isolamento cross-utente (utente A non vede i job di utente B)
  - **GET /api/distill/[id]**: 401 senza sessione, 404 per job inesistente, 404 per job appartenente ad altro utente (non 403), risposta completa con `result` e `sources` per un job DONE, risposta senza `result` per job PENDING
  - Nessun test e2e Playwright necessario per questa spec: pura API già coperta dal pattern Jest integration

  ---

  _Piano generato via ARchetipo Planning — 2026-06-19_
