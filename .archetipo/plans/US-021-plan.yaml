spec_code: US-021
body: "# US-021: Notifica browser al completamento di un distillato вЂ” Piano di Implementazione\n\n**Generato da:** ARchetipo Planning Team  \n**Data:** 2026-06-19\n\n---\n\n## Spec\n\n**Epic:** EP-004 вЂ” Notifica e Consultazione  \n**PrioritГ :** HIGH | **Punti:** 3\n\n**User Story**  \nIn qualitГ  di utente autenticato, voglio ricevere una notifica del browser quando un distillato che ho richiesto diventa DONE o FAILED, in modo da sapere che posso consultarne il risultato senza tenere d'occhio la pagina.\n\n**Criteri di Accettazione**\n- Al primo accesso alla pagina Archivio (o alla distill page), l'app richiede il permesso `Notification` al browser se non ancora concesso\n- Se il permesso ГЁ negato, la feature si disabilita silenziosamente (nessun errore visibile)\n- Il polling esistente sull'Archivio rileva la transizione di stato verso `DONE` o `FAILED` e attiva la notifica\n- La notifica mostra il topic del distillato nel titolo e un messaggio differenziato per DONE (\"Distillato pronto\") e FAILED (\"Elaborazione fallita\")\n- Cliccando la notifica si apre/porta in primo piano la tab e naviga alla pagina di dettaglio del job\n\n---\n\n## Soluzione Tecnica\n\nLa funzionalitГ  ГЁ interamente client-side e si innesta sul polling giГ  esistente in `ArchiveGrid.tsx` senza modifiche al backend.\n\n- **Hook `useBrowserNotification`** (`src/hooks/useBrowserNotification.ts`): gestisce il ciclo di vita dei permessi (`Notification.permission`). Al mount controlla lo stato corrente: se `default` chiama `requestPermission()` in modo asincrono; se `denied` rimane silenzioso. Espone un callback stabile `notify(topic, status, jobId)` che istanzia `new Notification(topic, { body, tag })` con `onclick` che chiama `window.focus()` e naviga a `/distill/{jobId}`. Tutto il codice ГЁ guardato da `typeof Notification === 'undefined'` per compatibilitГ  SSR.\n- **Integrazione in `ArchiveGrid.tsx`**: aggiunta di un `useRef<Map<string, string>>` (`prevStatusRef`) inizializzato da `initialJobs` prima del primo render вЂ” cosГ¬ i job giГ  DONE/FAILED al caricamento non producono notifiche. Dentro `fetchJobs` (giГ  `useCallback`), prima di chiamare `setJobs(data)`, si confronta ogni job in arrivo con lo snapshot in `prevStatusRef`; se la transizione ГЁ verso `DONE` o `FAILED` si chiama `notify()`; poi si aggiorna il ref. `notify` viene aggiunto alle dipendenze del `useCallback`.\n- **Testo delle notifiche**: DONE в†’ body `\"Distillato pronto\"`, FAILED в†’ body `\"Elaborazione fallita\"`; `tag: jobId` evita notifiche duplicate per lo stesso job.\n\n---\n\n## Strategia di Test\n\nTest unitari per la logica dell'hook e per la detection delle transizioni; test e2e Playwright per il flusso utente completo con video recording.\n\n- **Unit test `useBrowserNotification`** (Jest + @testing-library/react): mock di `window.Notification` e della sua proprietГ  `permission`; verifica che `requestPermission()` venga chiamato al mount quando il permesso ГЁ `default`; verifica che `notify()` istanzi `Notification` con titolo e body corretti per DONE e FAILED; verifica silenzio assoluto quando il permesso ГЁ `denied`.\n- **Unit test `ArchiveGrid` вЂ” detection transizioni** (Jest + @testing-library/react): mock di `fetch` per restituire prima uno job RUNNING poi DONE; verifica che la notifica venga emessa solo alla transizione; verifica che job giГ  DONE in `initialJobs` non producano notifiche al mount.\n- **E2E** (Playwright): `context.grantPermissions(['notifications'])` per bypassare il dialog OS; mock di `window.Notification` via `page.addInitScript` per catturare le chiamate; route intercept su `/api/distill` per simulare la sequenza RUNNINGв†’DONE; asserzione che il costruttore `Notification` sia stato chiamato con il topic corretto e body `\"Distillato pronto\"`; video recording abilitato per il test.\n\n### Test E2E вЂ” Simulazione Utente\n\n**Framework:** Playwright (`@playwright/test ^1.50.0`, giГ  configurato in `playwright.config.ts`)  \n**Video recording:** Abilitato (`test.use({ video: 'on' })`) вЂ” output in `docs/test-results/US-021/`\n\n| Scenario | Descrizione del flusso |\n|---|---|\n| Notifica DONE alla transizione | Utente autenticato apre `/archivio` con job RUNNING в†’ il poll successivo restituisce DONE в†’ la notifica compare con titolo del topic e body \"Distillato pronto\" |\n| Silenzio se permesso negato | Utente carica `/archivio`, il browser ha permesso `denied` в†’ nessun errore visibile, nessuna notifica |\n| Click sulla notifica naviga al dettaglio | Utente riceve notifica DONE в†’ clicca в†’ la tab porta in primo piano e naviga a `/distill/{id}` |\n\n---\n\n_Piano generato via ARchetipo Planning вЂ” 2026-06-19_"
