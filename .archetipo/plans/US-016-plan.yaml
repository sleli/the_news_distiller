schema: archetipo/plan/v2
spec_code: US-016
body: "# US-016: Creare la pagina di dettaglio distillato con posizioni e fonti cliccabili — Piano di Implementazione\n\n**Generato da:** ARchetipo Planning Team  \n**Data:** 2026-06-19\n\n---\n\n## Spec\n\n**Epic:** EP-004 — Notifica e Consultazione  \n**Priorità:** HIGH | **Punti:** 3  \n**Bloccato da:** US-014 (REVIEW — API GET pronte)\n\n**User Story**  \nIn qualità di Marco, utente autenticato, voglio aprire un distillato completato e leggere la sintesi, le posizioni identificate e le fonti cliccabili, in modo da verificare le informazioni direttamente dagli articoli originali.\n\n**Criteri di Accettazione**\n- `/distill/[id]` mostra il distillato completo per un job con status `DONE` di proprietà dell'utente\n- La pagina mostra: sezione sintesi, sezioni per ogni posizione (label + headline + testo), lista fonti con URL che aprono in `_blank`\n- Se il job non è `DONE`, la pagina mostra lo stato corrente con indicatore visivo per RUNNING/PENDING\n- Accedere al job di un altro utente mostra una pagina di errore senza rivelare l'esistenza del job\n\n---\n\n## Soluzione Tecnica\n\n### Contesto Attuale\n\nLa pagina `src/app/distill/[id]/page.tsx` esiste già ma mostra solo una vista statica \"Richiesta in Elaborazione\", indipendentemente dallo stato del job. Fa `redirect(\"/distill\")` per job non trovati o non di proprietà (comportamento errato per il requisito di errore neutro).\n\nIl tipo `DistillResult` è già esportato da `src/lib/claude.ts`:\n```ts\ntype DistillResult = {\n  summary: string;\n  positions: Array<{ label: string; headline: string; body: string; sourceRefs: string[] }>;\n  sources: Array<{ title: string; url: string }>;\n};\n```\n\nIl campo `DistillJob.result` (tipo `Json?` in Prisma) viene scritto dal worker come `DistillResult` — il cast `job.result as unknown as DistillResult` è sicuro per i job in stato `DONE`.\n\n### Approccio\n\n**1. Nuovo componente `DistillResultView.tsx`** — presentazionale puro, riceve il `DistillResult` come prop e lo renderizza in stile newspaper: sezione sintesi, sezioni posizione, lista fonti. Posizionato in `src/components/distill/DistillResultView.tsx`.\n\n**2. Aggiornamento `distill/[id]/page.tsx`** — il server component viene esteso con branching su `job.status`:\n- **`DONE`**: includi `sources: true` nella query Prisma, renderizza `<DistillResultView>`\n- **`PENDING` / `PROCESSING`**: mostra vista \"in elaborazione\" (layout esistente migliorato con indicatore visivo corretto)\n- **`FAILED`**: mostra vista di errore con styling rosso\n- **Job non trovato / utente diverso**: mostra pagina di errore neutra inline (NON `redirect()`) — stesso messaggio per entrambi i casi, senza rivelare se il job esiste\n\n### Struttura Sezioni della Vista DONE\n\n```\n[MASTHEAD + NAVBAR + TICKER]  ← identici alle altre pagine\n\n[HEADLINE] topic del distillato\n\n[SEZIONE SINTESI]\n  np-hl-deck con il testo summary\n\n[SEZIONI POSIZIONE] (una per ogni elemento di positions[])\n  label come kicker (np-hl-kicker)\n  headline come titolo colonna\n  body come testo articolo\n\n[LISTA FONTI]\n  np-sidebar con link (target=\"_blank\", rel=\"noopener noreferrer\")\n\n[FOOTER]\n```\n\n### Sicurezza\n\n- Non usare `redirect()` per job non trovati o di altro utente → stessa pagina di errore neutra per entrambi i casi (non rivela se il job esiste — conforme a SEC-01)\n- I dati `result` non vengono mai esposti via client component senza autenticazione server-side\n\n### Struttura `data-testid` per Testabilità\n\n| Elemento | data-testid |\n|---|---|\n| Vista distillato completo | `distill-result` |\n| Sezione sintesi | `synthesis-section` |\n| Ogni sezione posizione | `position-section` |\n| Lista fonti | `sources-list` |\n| Ogni link fonte | `source-link` |\n| Indicatore stato non-DONE | `job-status` (già presente) |\n| Pagina di errore | `error-page` |\n\n---\n\n## Strategia di Test\n\n### Test di Componente (Jest + Testing Library)\n\n**File:** `tests/unit/components/DistillResultView.test.tsx`\n\nCopre il rendering di `DistillResultView` con dati mock:\n- Sintesi presente e visibile\n- Corretto numero di sezioni posizione\n- Tutti i link fonte hanno `target=\"_blank\"` e `rel=\"noopener noreferrer\"`\n- Rendering con lista fonti vuota (graceful)\n\n### Test E2E — Playwright\n\n**Framework:** Playwright (già configurato, `tests/e2e/`, `@playwright/test`)  \n**Video recording:** Abilitato per ogni scenario  \n**Output video:** `docs/test-results/US-016/`  \n\n| Scenario | Flusso |\n|---|---|\n| Utente non autenticato | Visita `/distill/[some-id]` → redirect a `/auth/signin` (gestito dal middleware) |\n| Job DONE | Login → naviga a `/distill/[id]` di un job completato → vede sintesi + almeno una sezione posizione + lista fonti cliccabili |\n| Job non DONE (PENDING/PROCESSING) | Login → naviga a `/distill/[id]` di un job in coda → vede indicatore di stato, NO sezione sintesi |\n| Accesso non autorizzato | Login come utente A → tenta di aprire job di utente B → vede pagina errore neutra |\n\n---\n\n_Piano generato via ARchetipo Planning — 2026-06-19_"
tasks:
  - id: TASK-01
    title: Creare DistillResultView.tsx — componente presentazionale per il distillato DONE
    description: 'Creare src/components/distill/DistillResultView.tsx. Props: result (DistillResult importato da @/lib/claude), topic (string), tone (string). Renderizza: (1) sezione sintesi con data-testid=''synthesis-section'', (2) una sezione per ogni elemento di result.positions con label come kicker, headline come titolo, body come testo — data-testid=''position-section'' su ciascuna, (3) lista fonti da result.sources con data-testid=''sources-list'' e ogni link con data-testid=''source-link'', target=''_blank'', rel=''noopener noreferrer''. Stile newspaper coerente con il resto dell''app (classi np-*).'
    type: Impl
    status: DONE
    ref: TASK-01
  - id: TASK-02
    title: Aggiornare distill/[id]/page.tsx per branching su status e gestione errore inline
    description: 'Aggiornare src/app/distill/[id]/page.tsx: (1) aggiungere include: { sources: true } alla query Prisma. (2) Sostituire redirect(''/distill'') per job non trovato / userId diverso con una vista di errore inline (data-testid=''error-page'') — stesso messaggio neutro per entrambi i casi. (3) Branching su job.status: DONE → importare e renderizzare <DistillResultView result={job.result as unknown as DistillResult} topic={job.topic} tone={job.tone} />; PENDING/PROCESSING → vista ''in elaborazione'' (layout esistente, nessuna modifica strutturale); FAILED → vista errore con styling rosso. Importare DistillResult da ''@/lib/claude''.'
    type: Impl
    status: DONE
    dependencies:
      - TASK-01
    ref: TASK-02
  - id: TASK-03
    title: Test di componente Jest per DistillResultView
    description: 'Creare tests/unit/components/DistillResultView.test.tsx. Fixture: DistillResult mock con summary, due posizioni e due fonti. Coprire: (1) sintesi visibile, (2) numero corretto di sezioni posizione (data-testid=''position-section''), (3) tutti i link fonte hanno target=''_blank'' e rel=''noopener noreferrer'', (4) rendering con sources vuoto non crasha. Usare @testing-library/react.'
    type: Test
    status: DONE
    dependencies:
      - TASK-01
    ref: TASK-03
  - id: TASK-04
    title: Test E2E Playwright per la pagina di dettaglio distillato
    description: 'Creare tests/e2e/distill-detail.spec.ts. Abilitare video recording con outputDir in docs/test-results/US-016/ (via use: { video: ''on'' } per questo file oppure via fixture locale). Scenari: (1) utente non autenticato visita /distill/[id] → redirect a /auth/signin; (2) job DONE → vede data-testid=''distill-result'' con sintesi e almeno una sezione posizione; (3) job PENDING/PROCESSING → vede data-testid=''job-status'', NON vede data-testid=''distill-result''; (4) accesso a job di altro utente → vede data-testid=''error-page''. Usare page.request per creare job di test e login via API (pattern da distill-history.spec.ts).'
    type: Test
    status: DONE
    dependencies:
      - TASK-02
    ref: TASK-04
