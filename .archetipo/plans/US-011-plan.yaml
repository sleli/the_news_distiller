    title: Aggiungere validateDistillResult() a src/lib/claude.ts e integrare in distillArticles()
    description: 'Implementare `validateDistillResult(input: unknown): DistillResult` che verifica: (1) `summary` è stringa non vuota, (2) `positions` è array non vuoto dove ogni elemento ha `label`, `headline`, `body` come stringhe e `sourceRefs` come array con almeno 1 elemento, (3) `sources` è array dove ogni elemento ha `title` e `url` come stringhe non vuote. In caso di fallimento lancia `Error` con messaggio descrittivo che include `JSON.stringify(input).substring(0, 500)`. Aggiornare `distillArticles()` sostituendo `return toolUse.input as DistillResult` con `return validateDistillResult(toolUse.input)`. Aggiungere anche `minItems: 1` a `sourceRefs` nel `DISTILL_TOOL` JSON Schema.'
    type: Impl
    status: DONE
    ref: TASK-01
  - id: TASK-02
    title: Unit test per validateDistillResult in tests/unit/claude.test.ts
    description: 'Testare `validateDistillResult` direttamente: (1) payload valido completo → ritorna DistillResult senza errori; (2) `summary` mancante → throw Error; (3) posizione con `sourceRefs: []` → throw con frammento JSON nel messaggio; (4) fonte con `url` mancante → throw; (5) input `null` → throw; (6) input stringa → throw. Aggiungere anche un test che mocka la risposta Anthropic SDK con `tool_use` contenente payload invalido e verifica che `distillArticles()` lanci un errore di validazione.'
    type: Test
    status: DONE
    dependencies:
      - TASK-01
    ref: TASK-02
  - id: TASK-03
    title: Test aggiuntivo in tests/unit/processor.test.ts per propagazione errore di validazione
    description: 'Aggiungere un caso di test nel describe esistente di `processJobFull`: mock `distillArticles` che lancia `new Error(''Payload Claude non valido: {"summary":...}'')` (simula errore di validazione con payload nel messaggio) → verificare che `processJobFull` rilanci l''errore senza chiamare `prisma.distillJob.update` né `prisma.distillSource.createMany`.'
    type: Test
    status: DONE
    dependencies:
      - TASK-01
      - TASK-02
