    title: Rendere lazy l'inizializzazione del client Anthropic
    description: Spostare il check ANTHROPIC_API_KEY e la creazione del client Anthropic (attualmente a livello di modulo in claude.ts righe 4-10) dentro una funzione getAnthropicClient() chiamata solo nel branch SDK. Impedisce il crash all'import in modalità CLI_SUBPROCESS.
    type: Impl
    status: DONE
    ref: TASK-01
  - id: TASK-02
    title: Estrarre buildDistillPrompt come funzione pura esportata
    description: 'Separare la logica di costruzione del systemPrompt e userMessage in buildDistillPrompt(articles, topic, tone): { systemPrompt, userMessage, toolDef }. Nessun side effect, nessuna dipendenza esterna. Semplifica il testing e il riuso.'
    type: Impl
    status: DONE
    dependencies:
      - TASK-01
    ref: TASK-02
  - id: TASK-03
    title: Implementare distillViaCLI con child_process.spawn
    description: 'Nuova funzione distillViaCLI(systemPrompt, userMessage): Promise<DistillResult> che invoca `claude -p` come subprocess, passa il prompt via stdin, raccoglie stdout e lo parsa con validateDistillResult. Lancia ClaudeCliNotFoundError con messaggio esplicito se spawn fallisce con ENOENT.'
    type: Impl
    status: DONE
    dependencies:
      - TASK-02
    ref: TASK-03
  - id: TASK-04
    title: Modificare distillArticles per leggere AppSettings e fare dispatch
    description: 'All''inizio di distillArticles leggere prisma.appSettings.findUnique({ where: { id: ''default'' } }). Usare claudeMode (default ''API_KEY'' se record assente) per scegliere il backend. Delegare a distillViaCLI o alla chiamata SDK esistente.'
    type: Impl
    status: DONE
    dependencies:
      - TASK-03
    ref: TASK-04
  - id: TASK-05
    title: Test unitario modalità API_KEY
    description: Mock di appSettings con claudeMode='API_KEY' e mock del SDK Anthropic. Verificare che client.messages.create sia chiamato con i parametri corretti e che il risultato sia un DistillResult valido. Verifica anche il fallback quando AppSettings è null.
    type: Test
    status: DONE
    dependencies:
      - TASK-04
    ref: TASK-05
  - id: TASK-06
    title: Test unitario modalità CLI_SUBPROCESS e errore PATH
    description: '(1) Mock spawn → stdout JSON valido + appSettings CLI_SUBPROCESS: verifica risultato DistillResult e nessuna chiamata SDK. (2) Mock spawn → ENOENT: verifica lancio ClaudeCliNotFoundError con messaggio descrittivo.'
    type: Test
    status: DONE
    dependencies:
      - TASK-03
    ref: TASK-06
