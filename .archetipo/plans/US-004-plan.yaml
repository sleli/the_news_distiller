    type: Impl
    status: DONE
    ref: TASK-01
  - id: TASK-02
    title: Estendere src/lib/tones.ts con TONE_INSTRUCTIONS
    description: 'Aggiungere la mappa `TONE_INSTRUCTIONS: Record<ToneKey, string>` al file esistente `src/lib/tones.ts`. Ciascuna delle 4 chiavi (neutro, analitico, divulgativo, critico) deve contenere le istruzioni di prompt corrispondenti. Gli export esistenti (`VALID_TONES`, `ToneKey`, `isValidTone`) rimangono invariati.'
    type: Impl
    status: DONE
    ref: TASK-02
  - id: TASK-03
    title: Implementare src/lib/claude.ts
    description: 'Creare il file `src/lib/claude.ts` con: direttiva `import "server-only"`, guard a livello di modulo su `ANTHROPIC_API_KEY`, inizializzazione del client Anthropic, tipi esportati `DistillPosition`, `DistillSource`, `DistillResult`, definizione dello strumento `DISTILL_TOOL` con JSON Schema, e funzione `distillArticles(articles, topic, tone)` che usa forced tool use (`tool_choice: { type: ''tool'', name: ''extract_distillation'' }`) con il modello `claude-sonnet-4-6`.'
    type: Impl
    status: DONE
    dependencies:
      - TASK-01
      - TASK-02
    ref: TASK-03
  - id: TASK-04
    title: Documentare ANTHROPIC_API_KEY in .env.example
    description: Aggiungere `ANTHROPIC_API_KEY=` a `.env.example` (crearlo se non esiste) con un commento che indica dove ottenere la chiave API (console.anthropic.com).
    type: Impl
    status: DONE
    ref: TASK-04
  - id: TASK-05
    title: Scrivere unit test per src/lib/claude.ts
    description: 'Creare `tests/unit/claude.test.ts` con 4 test: (1) happy path — mock SDK che restituisce tool_use block valido, verifica struttura DistillResult; (2) parametrizzazione tono — spy su `client.messages.create`, verifica che il system prompt contenga l''istruzione del tono richiesto; (3) chiave mancante — `jest.resetModules()` + `delete process.env.ANTHROPIC_API_KEY`, verifica throw all''import; (4) tool use assente — mock che restituisce content di tipo `text`, verifica throw con messaggio atteso.'
    type: Test
    status: DONE
    dependencies:
      - TASK-03
    ref: TASK-05
  - id: TASK-06
    title: Scrivere unit test per TONE_INSTRUCTIONS in tones.ts
    description: 'Aggiungere o creare `tests/unit/tones.test.ts` con test che verificano: (1) `TONE_INSTRUCTIONS` contiene le 4 chiavi attese (neutro, analitico, divulgativo, critico); (2) ogni valore è una stringa non vuota; (3) `isValidTone` ritorna false per valori non nel set.'
    type: Test
    status: DONE
    dependencies:
